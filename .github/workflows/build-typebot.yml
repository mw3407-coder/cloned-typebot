name: Build Typebot Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Typebot (Builder + Viewer)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          TURBO_CONCURRENCY: "2"
          ENCRYPTION_SECRET: ${{ secrets.ENCRYPTION_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_VIEWER_URL: ${{ secrets.NEXT_PUBLIC_VIEWER_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          bunx turbo build --filter=builder... --filter=viewer...

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Builder Docker Image
        run: |
          docker build \
            --build-arg SCOPE=builder \
            --build-arg DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -t ghcr.io/${{ github.repository }}/builder:latest .

      - name: Build Viewer Docker Image
        run: |
          docker build \
            --build-arg SCOPE=viewer \
            --build-arg DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -t ghcr.io/${{ github.repository }}/viewer:latest .

      - name: Push Builder Image
        run: |
          docker push ghcr.io/${{ github.repository }}/builder:latest

      - name: Push Viewer Image
        run: |
          docker push ghcr.io/${{ github.repository }}/viewer:latest

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 134.209.179.191
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mw3407-coder --password-stdin
            cd ~/typebot
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f

      - name: Build Complete
        run: echo "✅ Typebot build complete and deployed!"

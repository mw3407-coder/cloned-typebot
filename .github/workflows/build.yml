name: Build Typebot

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Build Typebot (Builder + Viewer)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          TURBO_CONCURRENCY: "2"
        run: |
          bunx turbo build --filter=builder... --filter=viewer...
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      
      - name: Build Builder Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/typebot-builder:latest ./apps/builder
      
      - name: Build Viewer Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/typebot-viewer:latest ./apps/viewer
      
      - name: Push Builder Image
        run: |
          docker push ghcr.io/${{ github.repository }}/typebot-builder:latest
      
      - name: Push Viewer Image
        run: |
          docker push ghcr.io/${{ github.repository }}/typebot-viewer:latest
      
      - name: Build Complete
        run: echo "✅ Typebot build complete! Images pushed to GHCR"
